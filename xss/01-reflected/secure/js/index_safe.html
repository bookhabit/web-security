<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>[안전] Reflected XSS 방어 - Vanilla JS</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 20px; }
    .safe { background: #e0ffe0; border: 2px solid #090; padding: 10px; border-radius: 4px; }
    .box { background: #f5f5f5; padding: 15px; margin: 15px 0; border-radius: 4px; }
    .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .bad { background: #ffe0e0; padding: 10px; border-radius: 4px; }
    .good { background: #e0ffe0; padding: 10px; border-radius: 4px; }
    code { background: #eee; padding: 2px 6px; display: block; margin: 3px 0; font-size: 0.85em; }
    input { width: 70%; padding: 6px; }
    button { padding: 6px 14px; cursor: pointer; }
    #output { min-height: 40px; padding: 10px; border: 1px solid #ccc; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>[안전] Reflected XSS 방어 - Vanilla JS</h2>
  <div class="safe">✅ textContent를 사용한 안전한 버전입니다.</div>

  <div class="box">
    <div class="compare">
      <div class="bad">
        <strong>❌ 취약 (index.html)</strong>
        <code>output.innerHTML = '안녕하세요, ' + name + '님!';</code>
      </div>
      <div class="good">
        <strong>✅ 안전 (이 파일)</strong>
        <code>output.textContent = '안녕하세요, ' + name + '님!';</code>
      </div>
    </div>
  </div>

  <form id="searchForm">
    <input type="text" name="name" placeholder="<script>alert(1)</script> 를 입력해보세요" />
    <button type="submit">검색</button>
  </form>

  <div id="output">여기에 출력됩니다</div>

  <script>
    document.getElementById('searchForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = this.querySelector('input[name=name]').value;
      location.search = '?name=' + encodeURIComponent(name);
    });

    const params = new URLSearchParams(location.search);
    const name = params.get('name');
    if (name) {
      // ✅ 안전: textContent로 출력 - HTML 태그가 파싱되지 않음
      document.getElementById('output').textContent = '안녕하세요, ' + name + '님!';
    }
  </script>
</body>
</html>
