services:
  postgres:
    image: postgres:15-alpine
    container_name: authlab-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-authlab}
      POSTGRES_USER: ${DB_USER:-authlab}
      POSTGRES_PASSWORD: ${DB_PASS:-authlab1234}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-authlab} -d ${DB_NAME:-authlab}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: authlab-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@authlab.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data:
